<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<base href="/">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم — NAS CodeWorks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#080C14;--panel:#0F1A2E;--panel-2:#13233E;--line:#1E3354;--line-soft:#16263F;--fg:#EAF1FB;--fg-2:#94A7C2;--fg-3:#5E7290;--cyan:#00D4FF;--violet:#7C3AED;--green:#22C98A;--amber:#F5A524;--red:#EF4D4D;--r:14px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans Arabic',system-ui,sans-serif;background:var(--bg);color:var(--fg);line-height:1.7;font-variant-numeric:tabular-nums;min-height:100vh}
body::before{content:"";position:fixed;inset:0;z-index:-1;background:radial-gradient(800px 500px at 90% -10%,rgba(0,212,255,.06),transparent 60%),radial-gradient(700px 500px at -5% 108%,rgba(124,58,237,.1),transparent 62%),#080C14}
.topbar{position:sticky;top:0;z-index:50;background:rgba(8,12,20,.9);backdrop-filter:blur(14px);border-bottom:1px solid var(--line-soft);padding:13px 0}
.tb-in{max-width:1080px;margin:0 auto;padding:0 18px;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}
.tb-brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:15px}
.tb-brand .mk{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--cyan),var(--violet));position:relative;flex:none}
.tb-brand .mk::before{content:"";position:absolute;inset:0;margin:auto;width:11px;height:11px;border:2.5px solid #081019;border-radius:3px;transform:rotate(45deg)}
.tb-brand b{color:#fff}.tb-brand span{color:var(--cyan)}
.tb-brand .lbl{font-size:11px;color:var(--fg-3);font-weight:500;padding:3px 9px;background:var(--panel);border:1px solid var(--line);border-radius:100px;margin-right:6px}
.tb-actions{display:flex;gap:9px;flex-wrap:wrap}
.tbtn{display:inline-flex;align-items:center;gap:7px;font-family:inherit;font-size:13.5px;font-weight:600;padding:9px 15px;border-radius:10px;cursor:pointer;border:1px solid var(--line);background:var(--panel);color:var(--fg);transition:.18s}
.tbtn:hover{border-color:var(--cyan)}
.tbtn svg{width:16px;height:16px}
.tbtn.save{background:var(--green);color:#04130C;border-color:var(--green)}
.tbtn.save:hover{filter:brightness(1.1)}
.tbtn.prev{background:var(--cyan);color:#041019;border-color:var(--cyan)}
.tbtn.danger:hover{border-color:var(--red);color:var(--red)}
.layout{max-width:1080px;margin:0 auto;padding:20px 18px 90px;display:grid;grid-template-columns:210px 1fr;gap:20px;align-items:start}
.side{position:sticky;top:78px;background:var(--panel);border:1px solid var(--line-soft);border-radius:var(--r);padding:8px;display:flex;flex-direction:column;gap:3px}
.side a{padding:10px 13px;border-radius:9px;font-size:14px;color:var(--fg-2);font-weight:500;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:9px}
.side a:hover{background:var(--panel-2);color:var(--fg)}
.side a.active{background:linear-gradient(135deg,rgba(0,212,255,.15),rgba(124,58,237,.12));color:var(--cyan);border:1px solid var(--line)}
.side a svg{width:16px;height:16px;flex:none}
.main{min-width:0}
.card{background:var(--panel);border:1px solid var(--line-soft);border-radius:var(--r);padding:22px;margin-bottom:18px}
.card-h{display:flex;align-items:center;gap:11px;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--line-soft)}
.card-h .ci{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,rgba(0,212,255,.15),rgba(124,58,237,.15));border:1px solid var(--line);display:grid;place-items:center;flex:none}
.card-h .ci svg{width:19px;height:19px;color:var(--cyan)}
.card-h h2{font-size:17px;font-weight:600}
.card-h .hint{font-size:12.5px;color:var(--fg-3);margin-top:1px}
.fld{margin-bottom:15px}
.fld:last-child{margin-bottom:0}
.fld label{display:block;font-size:12.5px;color:var(--fg-2);margin-bottom:6px;font-weight:500}
.fld input,.fld textarea,.fld select{width:100%;background:#0a1322;border:1px solid var(--line);border-radius:10px;padding:11px 13px;color:var(--fg);font-family:inherit;font-size:14px;transition:.18s}
.fld input:focus,.fld textarea:focus,.fld select:focus{outline:none;border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,212,255,.1)}
.fld textarea{resize:vertical;min-height:70px;line-height:1.7}
.fld .sm{font-size:11.5px;color:var(--fg-3);margin-top:5px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.sub-card{background:#0a1322;border:1px solid var(--line-soft);border-radius:12px;padding:16px;margin-bottom:13px;position:relative}
.sub-card .sc-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px;gap:10px}
.sub-card .sc-head .t{font-size:13px;font-weight:600;color:var(--cyan);display:flex;align-items:center;gap:7px}
.sub-card .sc-head .t .num{width:22px;height:22px;border-radius:7px;background:var(--panel-2);display:grid;place-items:center;font-size:12px}
.mini{font-family:inherit;font-size:12px;font-weight:600;padding:6px 11px;border-radius:8px;cursor:pointer;border:1px solid var(--line);background:var(--panel);color:var(--fg-2);display:inline-flex;align-items:center;gap:6px;transition:.15s}
.mini:hover{border-color:var(--cyan);color:var(--cyan)}
.mini.del:hover{border-color:var(--red);color:var(--red)}
.mini svg{width:14px;height:14px}
.add-row{display:flex;gap:9px;margin-top:8px}
.add-btn{flex:1;font-family:inherit;font-size:13px;font-weight:600;padding:11px;border-radius:10px;cursor:pointer;border:1px dashed var(--line);background:transparent;color:var(--cyan);transition:.15s;display:flex;align-items:center;justify-content:center;gap:8px}
.add-btn:hover{background:rgba(0,212,255,.06);border-color:var(--cyan)}
.add-btn svg{width:16px;height:16px}
.list-item{display:flex;gap:9px;align-items:center;margin-bottom:9px}
.list-item input{flex:1}
.list-item .ord{display:flex;flex-direction:column;gap:2px}
.toggle{display:flex;align-items:center;gap:10px;padding:12px 14px;background:#0a1322;border:1px solid var(--line);border-radius:10px;cursor:pointer;margin-bottom:14px}
.toggle .sw{width:42px;height:24px;border-radius:100px;background:var(--line);position:relative;transition:.2s;flex:none}
.toggle .sw::after{content:"";position:absolute;top:3px;right:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:.2s}
.toggle.on .sw{background:var(--green)}
.toggle.on .sw::after{right:21px}
.toggle .tl{font-size:13.5px;font-weight:500}
.toggle .ts{font-size:11.5px;color:var(--fg-3)}
/* image manager */
.img-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:11px;margin-bottom:12px}
.img-cell{position:relative;aspect-ratio:4/3;border-radius:10px;overflow:hidden;border:1px solid var(--line);background:var(--panel-2);group}
.img-cell img{width:100%;height:100%;object-fit:cover}
.img-cell .ig-ov{position:absolute;inset:0;background:linear-gradient(0deg,rgba(8,12,20,.85),transparent 60%);opacity:0;transition:.18s;display:flex;align-items:flex-end;justify-content:center;gap:5px;padding:7px}
.img-cell:hover .ig-ov{opacity:1}
.img-cell .ig-ov button{width:28px;height:28px;border-radius:7px;border:none;background:rgba(15,26,46,.9);color:var(--fg);cursor:pointer;display:grid;place-items:center;transition:.15s}
.img-cell .ig-ov button:hover{background:var(--cyan);color:#041019}
.img-cell .ig-ov button.del:hover{background:var(--red);color:#fff}
.img-cell .ig-ov button svg{width:14px;height:14px}
.img-cell .badge{position:absolute;top:6px;right:6px;background:var(--cyan);color:#041019;font-size:10px;font-weight:700;padding:2px 7px;border-radius:100px}
.drop{border:1px dashed var(--line);border-radius:11px;padding:18px;text-align:center;cursor:pointer;transition:.18s;background:#0a1322}
.drop:hover{border-color:var(--cyan);background:rgba(0,212,255,.04)}
.drop svg{width:26px;height:26px;color:var(--cyan);margin-bottom:7px}
.drop .dt{font-size:13.5px;font-weight:600}
.drop .ds{font-size:11.5px;color:var(--fg-3);margin-top:3px}
.url-row{display:flex;gap:8px;margin-top:10px}
.url-row input{flex:1;background:#0a1322;border:1px solid var(--line);border-radius:9px;padding:10px 12px;color:var(--fg);font-family:inherit;font-size:13px}
.url-row input:focus{outline:none;border-color:var(--cyan)}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--panel-2);border:1px solid var(--green);color:var(--fg);padding:13px 22px;border-radius:12px;font-size:14px;font-weight:600;z-index:200;opacity:0;transition:.3s;display:flex;align-items:center;gap:9px;box-shadow:0 18px 50px -20px rgba(0,0,0,.7)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast svg{width:18px;height:18px;color:var(--green)}
.panel-sec{display:none}
.panel-sec.active{display:block}
.warn{background:rgba(245,165,36,.1);border:1px solid rgba(245,165,36,.35);border-radius:11px;padding:13px 15px;font-size:13px;color:#f3c976;margin-bottom:18px;display:flex;gap:10px}
.warn svg{width:18px;height:18px;color:var(--amber);flex:none;margin-top:2px}
.row-icon-sel{display:flex;gap:6px;flex-wrap:wrap}
.row-icon-sel button{width:36px;height:36px;border-radius:9px;border:1px solid var(--line);background:#0a1322;color:var(--fg-2);cursor:pointer;display:grid;place-items:center;transition:.15s}
.row-icon-sel button svg{width:18px;height:18px}
.row-icon-sel button.sel{border-color:var(--cyan);color:var(--cyan);background:rgba(0,212,255,.08)}
@media(max-width:820px){.layout{grid-template-columns:1fr}.side{position:static;flex-direction:row;overflow-x:auto;top:0}.side a{white-space:nowrap}.grid2,.grid3{grid-template-columns:1fr}}
/* gate */
.gate{position:fixed;inset:0;z-index:500;background:#080C14;display:flex;align-items:center;justify-content:center;padding:20px}
.gate-card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:34px;max-width:380px;width:100%;text-align:center}
.gate-card .gmk{width:54px;height:54px;border-radius:14px;background:linear-gradient(135deg,var(--cyan),var(--violet));margin:0 auto 18px;position:relative}
.gate-card .gmk::before{content:"";position:absolute;inset:0;margin:auto;width:20px;height:20px;border:3px solid #081019;border-radius:5px;transform:rotate(45deg)}
.gate-card h1{font-size:19px;margin-bottom:6px}
.gate-card p{font-size:13px;color:var(--fg-3);margin-bottom:20px}
.gate-card input{width:100%;background:#0a1322;border:1px solid var(--line);border-radius:11px;padding:13px 15px;color:var(--fg);font-family:inherit;font-size:15px;text-align:center;margin-bottom:13px;letter-spacing:2px}
.gate-card input:focus{outline:none;border-color:var(--cyan)}
.gate-card button{width:100%;background:var(--cyan);color:#041019;font-weight:700;font-size:15px;padding:13px;border-radius:11px;border:none;cursor:pointer;font-family:inherit}
.gate-err{color:var(--red);font-size:12.5px;margin-bottom:10px;min-height:16px}
.gate-note{font-size:11px;color:var(--fg-3);margin-top:16px;line-height:1.6}
</style>
</head>
<body>

<!-- GATE -->
<div class="gate" id="gate">
  <div class="gate-card">
    <div class="gmk"></div>
    <h1>لوحة تحكم NAS CodeWorks</h1>
    <p>أدخل رمز الدخول للمتابعة</p>
    <div class="gate-err" id="gate-err"></div>
    <input type="password" id="gate-pass" placeholder="••••••" autocomplete="current-password">
    <button id="gate-go">دخول</button>
    <div class="gate-note">ملاحظة: هذا الرمز حماية واجهة فقط. للحماية الفعلية بعد النشر يلزم Backend (المرحلة الثانية).</div>
  </div>
</div>

<div id="adminroot" style="display:none">
<div class="topbar"><div class="tb-in">
  <div class="tb-brand"><span class="mk"></span><span>NAS</span> <b>CodeWorks</b><span class="lbl">لوحة التحكم</span></div>
  <div class="tb-actions">
    <button class="tbtn prev" id="btn-preview"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>معاينة الموقع</button>
    <button class="tbtn" id="btn-import"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>استيراد</button>
    <button class="tbtn" id="btn-export"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5-5 5 5M12 5v10" transform="rotate(180 12 12)"/></svg>تصدير JSON</button>
    <button class="tbtn save" id="btn-save"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><path d="M17 21v-8H7v8M7 3v5h8"/></svg>حفظ</button>
  </div>
</div></div>

<div class="layout">
  <nav class="side" id="side"></nav>
  <div class="main" id="main"></div>
</div>
</div>

<div class="toast" id="toast"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg><span id="toast-msg">تم الحفظ</span></div>
<input type="file" id="file-import" accept="application/json" style="display:none">

<script src="/content-default.js"></script>
<script src="/admin.js"></script>
</body>
</html>
