<!doctype html>
<html lang="ar" dir="rtl">
<head>
<base href="/">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>لوحة التحكم — NAS CodeWorks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080C14;--bg-2:#0A1220;
  --panel:#0F1A2E;--panel-2:#13233E;--panel-3:#0A1525;
  --line:#1E3354;--line-soft:#16263F;
  --fg:#EAF1FB;--fg-2:#94A7C2;--fg-3:#5E7290;
  --cyan:#00D4FF;--violet:#7C3AED;
  --green:#22C98A;--amber:#F5A524;--red:#EF4D4D;
  --r:12px;--topbar-h:58px;--sidebar-w:212px;--pv-w:400px;
  --mono:'IBM Plex Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans Arabic',system-ui,sans-serif;background:var(--bg);color:var(--fg);line-height:1.65;min-height:100vh;overflow-x:hidden;font-variant-numeric:tabular-nums}
body::before{content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;background:radial-gradient(700px 400px at 90% -5%,rgba(0,212,255,.07),transparent 55%),radial-gradient(600px 400px at -5% 110%,rgba(124,58,237,.09),transparent 55%)}

/* ── Topbar ── */
.topbar{position:fixed;top:0;left:0;right:0;z-index:100;height:var(--topbar-h);background:rgba(8,12,20,.94);backdrop-filter:blur(16px);border-bottom:1px solid var(--line-soft)}
.tb-in{padding:0 18px;height:100%;display:flex;align-items:center;gap:12px}
.tb-brand{display:flex;align-items:center;gap:9px;font-weight:700;font-size:15px;flex:none}
.tb-brand .mk{width:28px;height:28px;border-radius:7px;flex:none;background:linear-gradient(135deg,var(--cyan),var(--violet));display:grid;place-items:center;position:relative}
.tb-brand .mk::before{content:"";position:absolute;width:10px;height:10px;border:2px solid #081019;border-radius:2.5px;transform:rotate(45deg)}
.tb-brand b{color:#fff}.tb-brand span{color:var(--cyan)}
.tb-brand .env{font-family:var(--mono);font-size:9.5px;color:var(--fg-3);background:var(--panel);border:1px solid var(--line);border-radius:4px;padding:2px 7px;letter-spacing:.8px;margin-right:4px}
.tb-status{flex:1;display:flex;align-items:center;gap:7px;font-family:var(--mono);font-size:11px;color:var(--fg-3)}
.tb-status .dot{width:6px;height:6px;border-radius:50%;background:var(--fg-3);flex:none;transition:.3s}
.tb-status.saved .dot{background:var(--green);box-shadow:0 0 7px var(--green)}
.tb-status.saving .dot{background:var(--amber);animation:blink .7s infinite}
.tb-status.error .dot{background:var(--red)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.tb-actions{display:flex;gap:7px;align-items:center;flex:none}
.tbtn{display:inline-flex;align-items:center;gap:6px;font-family:inherit;font-size:13px;font-weight:600;padding:8px 13px;border-radius:9px;cursor:pointer;border:1px solid var(--line);background:var(--panel);color:var(--fg-2);transition:.18s;white-space:nowrap}
.tbtn:hover{border-color:var(--cyan);color:var(--fg)}
.tbtn svg{width:14px;height:14px;flex:none}
.tbtn.save{background:var(--green);color:#04130C;border-color:var(--green);font-size:13.5px}
.tbtn.save:hover{filter:brightness(1.08)}
.tbtn.prev{background:rgba(0,212,255,.1);color:var(--cyan);border-color:rgba(0,212,255,.25)}
.tbtn.prev:hover{background:rgba(0,212,255,.18)}
.tbtn.danger{color:var(--red)}.tbtn.danger:hover{border-color:var(--red);background:rgba(239,77,77,.07)}
.tbtn.test{background:rgba(124,58,237,.1);color:#a78bfa;border-color:rgba(124,58,237,.25)}.tbtn.test:hover{background:rgba(124,58,237,.18)}

/* ── Layout: sidebar | editor | preview ── */
.layout{display:grid;grid-template-columns:var(--sidebar-w) minmax(0,1fr) var(--pv-w);min-height:calc(100vh - var(--topbar-h));margin-top:var(--topbar-h)}
body.pv-off .layout{grid-template-columns:var(--sidebar-w) minmax(0,1fr) 0}
body.pv-off .pv-panel{display:none}

/* ── Sidebar ── */
.side{position:sticky;top:var(--topbar-h);height:calc(100vh - var(--topbar-h));overflow-y:auto;overflow-x:hidden;background:var(--panel);border-left:1px solid var(--line-soft);padding:12px 8px 40px;scrollbar-width:thin;scrollbar-color:var(--line) transparent}
.side::-webkit-scrollbar{width:3px}.side::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}
.side-group{margin-bottom:4px}
.side-group-label{display:block;font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:1.8px;text-transform:uppercase;color:var(--fg-3);padding:10px 8px 4px}
.side a{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:9px;font-size:13px;font-weight:500;color:var(--fg-2);cursor:pointer;transition:.14s;border:1px solid transparent;user-select:none;text-decoration:none;position:relative}
.side a:hover{background:var(--panel-2);color:var(--fg)}
.side a.active{background:linear-gradient(135deg,rgba(0,212,255,.13),rgba(124,58,237,.1));color:var(--cyan);border-color:rgba(0,212,255,.18)}
.side a.active::after{content:"";position:absolute;top:50%;left:0;transform:translateY(-50%);width:2px;height:55%;background:var(--cyan);border-radius:2px}
.side a svg{width:14px;height:14px;flex:none;opacity:.65}
.side a.active svg{opacity:1}
.side-divider{height:1px;background:var(--line-soft);margin:6px 4px}

/* ── Editor ── */
.main{min-width:0;padding:18px 18px 80px;background:var(--bg-2);overflow-y:auto}

.sec-hero{display:flex;align-items:center;gap:14px;padding:14px 18px;background:var(--panel);border:1px solid var(--line-soft);border-radius:var(--r);margin-bottom:16px}
.sec-hero .sh-icon{width:40px;height:40px;border-radius:11px;flex:none;background:linear-gradient(135deg,rgba(0,212,255,.16),rgba(124,58,237,.14));border:1px solid rgba(0,212,255,.18);display:grid;place-items:center}
.sec-hero .sh-icon svg{width:19px;height:19px;color:var(--cyan)}
.sec-hero h1{font-size:16px;font-weight:700;line-height:1.2;margin-bottom:2px}
.sec-hero p{font-size:12px;color:var(--fg-3);line-height:1.5}

.card{background:var(--panel);border:1px solid var(--line-soft);border-radius:var(--r);margin-bottom:14px;overflow:hidden}
.card-h{display:flex;align-items:center;gap:11px;padding:13px 16px;border-bottom:1px solid var(--line-soft);background:linear-gradient(to right,rgba(0,212,255,.03),transparent)}
.card-h .ci{width:30px;height:30px;border-radius:8px;flex:none;background:linear-gradient(135deg,rgba(0,212,255,.13),rgba(124,58,237,.11));border:1px solid var(--line);display:grid;place-items:center}
.card-h .ci svg{width:16px;height:16px;color:var(--cyan)}
.card-h h2{font-size:14px;font-weight:600;margin-bottom:1px}
.card-h .hint{font-size:11px;color:var(--fg-3)}

/* ══ CARD-GRID FIELDS ══ */
.card-body{padding:14px 16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(215px,1fr));gap:10px;align-items:start}
.card-body>.fld{background:var(--panel-3);border:1px solid var(--line-soft);border-radius:10px;padding:11px 12px;margin:0;transition:border-color .16s}
.card-body>.fld:hover{border-color:var(--line)}
.card-body>.fld:focus-within{border-color:rgba(0,212,255,.35)}
.card-body>.fld:has(textarea){grid-column:1/-1}
.card-body>div:not(.fld),.card-body>hr,.card-body>button{grid-column:1/-1}
.card-body .sub-card{grid-column:1/-1}
.card-body .warn,.card-body .info{grid-column:1/-1}

.fld{margin-bottom:0}
.fld label{display:block;font-size:11px;font-weight:600;color:var(--fg-3);margin-bottom:5px;letter-spacing:.3px}
.fld input,.fld textarea,.fld select{width:100%;background:rgba(8,14,26,.7);border:1px solid var(--line);border-radius:8px;padding:8px 11px;color:var(--fg);font-family:inherit;font-size:13px;transition:.16s}
.fld input:focus,.fld textarea:focus,.fld select:focus{outline:none;border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,212,255,.07)}
.fld textarea{resize:vertical;min-height:64px;line-height:1.7}
.fld .sm{font-size:10.5px;color:var(--fg-3);margin-top:4px;line-height:1.5}
.field-row,.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;grid-column:1/-1}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;grid-column:1/-1}
.field-row .fld,.grid2 .fld,.grid3 .fld{margin:0;background:var(--panel-3);border:1px solid var(--line-soft);border-radius:10px;padding:11px 12px}

/* Sub-cards (collapsible) — grid inside body */
.sub-card{background:var(--panel-3);border:1px solid var(--line-soft);border-radius:11px;margin-bottom:9px;overflow:hidden;transition:border-color .2s}
.sub-card:hover{border-color:var(--line)}
.sub-card.open{border-color:rgba(0,212,255,.18)}
.sc-head{display:flex;align-items:center;gap:9px;padding:10px 13px;cursor:pointer;user-select:none;transition:.14s}
.sc-head:hover{background:rgba(0,212,255,.04)}
.sc-num{width:20px;height:20px;border-radius:5px;flex:none;background:var(--panel-2);border:1px solid var(--line);display:grid;place-items:center;font-family:var(--mono);font-size:10px;font-weight:600;color:var(--cyan)}
.sc-label{font-size:13px;font-weight:600;color:var(--fg-2);flex:1}
.sc-name{font-size:11.5px;color:var(--fg-3);max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sc-chevron{width:16px;height:16px;color:var(--fg-3);flex:none;transition:transform .25s}
.sub-card.open .sc-chevron{transform:rotate(180deg)}
.sc-acts{display:flex;gap:4px;flex:none}
.sc-head .t{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:600;color:var(--cyan);flex:1}
.sc-head .t .num{width:20px;height:20px;border-radius:5px;background:var(--panel-2);display:grid;place-items:center;font-family:var(--mono);font-size:10px;font-weight:600;border:1px solid var(--line)}
.sc-body{max-height:0;overflow:hidden;transition:max-height .3s ease,padding .25s ease;padding:0 13px;display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:9px;align-items:start}
.sub-card.open .sc-body{max-height:9999px;padding:10px 13px 13px}
.sc-body>.fld{background:rgba(8,14,26,.55);border:1px solid var(--line-soft);border-radius:9px;padding:10px 11px}
.sc-body>.fld:has(textarea){grid-column:1/-1}
.sc-body>div:not(.fld),.sc-body>button{grid-column:1/-1}

.mini{font-family:inherit;font-size:12px;font-weight:600;padding:5px 9px;border-radius:7px;cursor:pointer;border:1px solid var(--line);background:var(--panel);color:var(--fg-2);display:inline-flex;align-items:center;gap:5px;transition:.14s}
.mini:hover{border-color:var(--cyan);color:var(--cyan)}
.mini.del:hover{border-color:var(--red);color:var(--red)}
.mini svg{width:13px;height:13px}
.add-btn{width:100%;font-family:inherit;font-size:13px;font-weight:600;padding:10px;border-radius:9px;cursor:pointer;border:1.5px dashed var(--line);background:transparent;color:var(--cyan);transition:.18s;display:flex;align-items:center;justify-content:center;gap:7px;margin-top:5px}
.add-btn:hover{background:rgba(0,212,255,.06);border-color:rgba(0,212,255,.35)}
.add-btn svg{width:14px;height:14px}
.list-item{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.list-item input{flex:1}
.list-item .ord{display:flex;gap:3px}

.toggle{display:flex;align-items:center;gap:11px;padding:12px 13px;background:var(--panel-3);border:1px solid var(--line);border-radius:10px;cursor:pointer;margin-bottom:0;transition:.18s}
.toggle.on{border-color:rgba(34,201,138,.22);background:rgba(34,201,138,.04)}
.toggle .sw{width:38px;height:21px;border-radius:100px;background:var(--line);position:relative;transition:.2s;flex:none}
.toggle .sw::after{content:"";position:absolute;top:3px;right:3px;width:15px;height:15px;border-radius:50%;background:#fff;transition:.2s}
.toggle.on .sw{background:var(--green)}
.toggle.on .sw::after{right:20px}
.toggle .tl{font-size:13px;font-weight:600;flex:1}
.toggle .ts{font-size:11px;color:var(--fg-3);margin-top:1px}

.row-icon-sel{display:flex;gap:6px;flex-wrap:wrap}
.row-icon-sel button{width:34px;height:34px;border-radius:8px;border:1px solid var(--line);background:var(--panel-3);color:var(--fg-2);cursor:pointer;display:grid;place-items:center;transition:.14s}
.row-icon-sel button svg{width:16px;height:16px}
.row-icon-sel button.sel{border-color:var(--cyan);color:var(--cyan);background:rgba(0,212,255,.1)}

.img-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(95px,1fr));gap:9px;margin-bottom:11px}
.img-cell{position:relative;aspect-ratio:4/3;border-radius:9px;overflow:hidden;border:1px solid var(--line);background:var(--panel-2)}
.img-cell img{width:100%;height:100%;object-fit:cover}
.img-cell .ig-ov{position:absolute;inset:0;background:linear-gradient(0deg,rgba(8,12,20,.85),transparent 55%);opacity:0;transition:.18s;display:flex;align-items:flex-end;justify-content:center;gap:5px;padding:6px}
.img-cell:hover .ig-ov{opacity:1}
.img-cell .ig-ov button{width:25px;height:25px;border-radius:6px;border:none;background:rgba(15,26,46,.9);color:var(--fg);cursor:pointer;display:grid;place-items:center}
.img-cell .ig-ov button:hover{background:var(--cyan);color:#041019}
.img-cell .ig-ov button.del:hover{background:var(--red);color:#fff}
.img-cell .ig-ov button svg{width:12px;height:12px}
.img-cell .badge{position:absolute;top:5px;right:5px;background:var(--cyan);color:#041019;font-size:9px;font-weight:700;padding:2px 6px;border-radius:100px}
.drop{border:1.5px dashed var(--line);border-radius:10px;padding:18px 14px;text-align:center;cursor:pointer;transition:.18s;background:var(--panel-3)}
.drop:hover{border-color:rgba(0,212,255,.4);background:rgba(0,212,255,.04)}
.drop svg{width:22px;height:22px;color:var(--cyan);margin-bottom:7px}
.drop .dt{font-size:13px;font-weight:600;margin-bottom:2px}
.drop .ds{font-size:11.5px;color:var(--fg-3)}
.url-row{display:flex;gap:8px;margin-top:9px}
.url-row input{flex:1;background:var(--panel-3);border:1px solid var(--line);border-radius:9px;padding:9px 11px;color:var(--fg);font-family:inherit;font-size:13px}
.url-row input:focus{outline:none;border-color:var(--cyan)}

.warn{background:rgba(245,165,36,.07);border:1px solid rgba(245,165,36,.25);border-radius:9px;padding:11px 13px;font-size:12.5px;color:#f3c976;margin-bottom:0;display:flex;gap:9px;line-height:1.6}
.warn svg{width:16px;height:16px;color:var(--amber);flex:none;margin-top:2px}
.info{background:rgba(0,212,255,.06);border:1px solid rgba(0,212,255,.18);border-radius:9px;padding:11px 13px;font-size:12.5px;color:var(--cyan);margin-bottom:0;display:flex;gap:9px;line-height:1.6}
hr{border:none;border-top:1px solid var(--line-soft);margin:8px 0}

/* ── Preview panel ── */
.pv-panel{position:sticky;top:var(--topbar-h);height:calc(100vh - var(--topbar-h));background:#060B14;border-right:1px solid var(--line-soft);display:flex;flex-direction:column;overflow:hidden}
.pv-panel.pv-none .pv-body::after{content:"لا توجد معاينة لهذا القسم";position:absolute;inset:0;display:grid;place-items:center;background:#060B14;color:var(--fg-3);font-size:13px;z-index:5}
.pv-head{display:flex;align-items:center;gap:8px;padding:9px 13px;border-bottom:1px solid var(--line-soft);background:var(--panel);flex:none}
.pv-live{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:9px;letter-spacing:1.2px;color:var(--green);background:rgba(34,201,138,.08);border:1px solid rgba(34,201,138,.2);border-radius:100px;padding:3px 8px;flex:none}
.pv-live::before{content:"";width:5px;height:5px;border-radius:50%;background:var(--green);animation:blink 1.6s infinite}
.pv-title{flex:1;font-size:12.5px;font-weight:600;color:var(--fg-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pv-acts{display:flex;gap:4px;flex:none}
.pvbtn{width:27px;height:27px;border-radius:7px;border:1px solid var(--line);background:var(--panel-3);color:var(--fg-2);cursor:pointer;display:grid;place-items:center;transition:.14s}
.pvbtn:hover{border-color:var(--cyan);color:var(--cyan)}
.pvbtn.on{border-color:var(--cyan);color:var(--cyan);background:rgba(0,212,255,.1)}
.pvbtn svg{width:13px;height:13px}
.pv-body{flex:1;position:relative;overflow:hidden;background:#080C14}
#pv-frame{width:100%;height:100%;border:0;background:#080C14;display:block}

/* Toast / Gate */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--panel-2);border:1px solid var(--green);color:var(--fg);padding:10px 18px;border-radius:10px;font-size:13.5px;font-weight:600;z-index:500;opacity:0;transition:.28s;display:flex;align-items:center;gap:8px;box-shadow:0 16px 40px -18px rgba(0,0,0,.8);pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast svg{width:16px;height:16px;color:var(--green);flex:none}
.gate{position:fixed;inset:0;z-index:1000;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:20px}
.gate-card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:34px;max-width:370px;width:100%;text-align:center}
.gate-card .gmk{width:50px;height:50px;border-radius:13px;background:linear-gradient(135deg,var(--cyan),var(--violet));margin:0 auto 18px;position:relative}
.gate-card .gmk::before{content:"";position:absolute;inset:0;margin:auto;width:19px;height:19px;border:2.5px solid #081019;border-radius:4px;transform:rotate(45deg)}
.gate-card h1{font-size:18px;font-weight:700;margin-bottom:6px}
.gate-card p{font-size:13px;color:var(--fg-3);margin-bottom:20px}
.gate-card input{width:100%;background:var(--panel-3);border:1px solid var(--line);border-radius:10px;padding:12px 14px;color:var(--fg);font-family:inherit;font-size:15px;text-align:center;margin-bottom:12px;letter-spacing:2px}
.gate-card input:focus{outline:none;border-color:var(--cyan)}
.gate-card button{width:100%;background:var(--cyan);color:#041019;font-weight:700;font-size:15px;padding:13px;border-radius:10px;border:none;cursor:pointer;font-family:inherit;transition:.18s}
.gate-card button:hover{filter:brightness(1.08)}
.gate-err{color:var(--red);font-size:12px;margin-bottom:9px;min-height:15px}
.gate-note{font-size:11px;color:var(--fg-3);margin-top:14px;line-height:1.6}

/* Responsive */
@media(max-width:1250px){
  :root{--pv-w:340px}
}
@media(max-width:1080px){
  .layout{grid-template-columns:var(--sidebar-w) minmax(0,1fr)}
  .pv-panel{display:none}
}
@media(max-width:820px){
  .layout{grid-template-columns:1fr}
  .side{position:static;height:auto;display:flex;flex-direction:row;overflow-x:auto;flex-wrap:nowrap;padding:7px 8px;border-left:none;border-bottom:1px solid var(--line-soft);gap:3px}
  .side-group{display:contents}.side-group-label,.side-divider{display:none}
  .side a{white-space:nowrap;padding:7px 11px;font-size:12.5px}
  .side a.active::after{display:none}
  .main{padding:13px 13px 60px}
  .sec-hero{flex-wrap:wrap}
  .card-body,.sc-body{grid-template-columns:1fr}
  .field-row,.grid2,.grid3{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="gate" id="gate">
  <div class="gate-card">
    <div class="gmk"></div>
    <h1>لوحة تحكم NAS CodeWorks</h1>
    <p>أدخل رمز الدخول للمتابعة</p>
    <div class="gate-err" id="gate-err"></div>
    <input type="password" id="gate-pass" placeholder="••••••" autocomplete="current-password">
    <button id="gate-go">دخول</button>
    <div class="gate-note">رمز الدخول يُحفظ بالمتصفح فقط — للحماية الفعلية يلزم Backend.</div>
  </div>
</div>

<div id="adminroot" style="display:none">
  <header class="topbar">
    <div class="tb-in">
      <div class="tb-brand">
        <span class="mk"></span><span>NAS</span><b>CodeWorks</b>
        <span class="env">ADMIN</span>
      </div>
      <div class="tb-status" id="tb-status">
        <span class="dot"></span>
        <span id="tb-status-text">جاهز</span>
      </div>
      <div class="tb-actions">
        <button class="tbtn prev" id="btn-preview">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>الموقع
        </button>
        <button class="tbtn" id="btn-import">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>استيراد
        </button>
        <button class="tbtn" id="btn-export">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>تصدير
        </button>
        <button class="tbtn save" id="btn-save">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><path d="M17 21v-8H7v8M7 3v5h8"/></svg>حفظ ونشر
        </button>
      </div>
    </div>
  </header>

  <div class="layout">
    <nav class="side" id="side"></nav>
    <main class="main" id="main"></main>
    <aside class="pv-panel" id="pv-panel">
      <div class="pv-head">
        <span class="pv-live">LIVE</span>
        <span class="pv-title" id="pv-title">المعاينة</span>
        <div class="pv-acts">
          <button class="pvbtn" id="pv-dev" title="عرض سطح المكتب">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
          </button>
          <button class="pvbtn" id="pv-reload" title="تحديث">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
          </button>
          <button class="pvbtn" id="pv-open" title="فتح في تبويب جديد">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6v6M10 14L21 3"/></svg>
          </button>
          <button class="pvbtn" id="pv-close" title="إخفاء المعاينة">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
          </button>
        </div>
      </div>
      <div class="pv-body" id="pv-body">
        <iframe id="pv-frame" src="about:blank" title="معاينة القسم"></iframe>
      </div>
    </aside>
  </div>
</div>

<div class="toast" id="toast">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg>
  <span id="toast-msg">تم الحفظ</span>
</div>
<input type="file" id="file-import" accept="application/json" style="display:none">

<script src="/content-default.js"></script>
<script src="/admin.js"></script>
<script src="/admin-upload-r2.js"></script>
<script src="/admin-publish-click.js"></script>
</body>
