<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NAS Document Studio — docpdf</title>
  <meta name="robots" content="noindex" />
  <style>
    *{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;background:#060a12;color:#e8f3fb;font-family:"IBM Plex Sans Arabic","Segoe UI",Tahoma,Arial,sans-serif;overflow:hidden}
    .shell{position:fixed;inset:0;display:grid;grid-template-rows:42px 1fr;background:#060a12}
    .bar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:0 14px;border-bottom:1px solid rgba(0,212,255,.16);background:linear-gradient(180deg,#0d1726,#09101b);font-size:12px;color:#7f93a9}
    .brand{display:flex;align-items:center;gap:8px;color:#e8f3fb;font-weight:800}.dot{width:18px;height:18px;border-radius:50%;background:conic-gradient(from 20deg,transparent 0 18%,#00d4ff 19% 27%,transparent 28% 43%,#00d4ff 44% 53%,transparent 54%);box-shadow:0 0 16px rgba(0,212,255,.35)}
    .bar a{color:#00d4ff;text-decoration:none}.status{opacity:.8}iframe{display:block;width:100%;height:100%;border:0;background:#060a12}.fallback{padding:24px;color:#e8f3fb;font-size:14px}
  </style>
</head>
<body>
  <div class="shell">
    <div class="bar">
      <div class="brand"><span class="dot"></span><span>NAS Document Studio</span></div>
      <div class="status" id="status">Loading embedded app…</div>
    </div>
    <iframe id="app" title="NAS Document Studio" sandbox="allow-scripts allow-downloads allow-forms allow-modals allow-popups"></iframe>
  </div>
  <script>
    const statusEl = document.getElementById('status');
    const frame = document.getElementById('app');
    const url = 'https://cdn.jsdelivr.net/gh/sufyanaser/NAS_docstudio@main/index.html?v=' + Date.now();
    fetch(url, { cache: 'no-store' })
      .then(r => {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.text();
      })
      .then(html => {
        frame.srcdoc = html;
        statusEl.innerHTML = 'Hosted at <strong>nascw.net/docpdf</strong> · Source: <a href="https://github.com/sufyanaser/NAS_docstudio" target="_blank" rel="noreferrer">NAS_docstudio</a>';
      })
      .catch(err => {
        statusEl.textContent = 'Load failed';
        frame.srcdoc = '<div class="fallback" dir="rtl">تعذر تحميل NAS Document Studio. افتح المصدر مباشرة من GitHub أو أعد تحديث الصفحة.<br><br>' + String(err.message) + '</div>';
      });
  </script>
</body>
</html>
