h){let v=get(path);return`<div class='lab'><span>${label}</span><span>${v?'ON':'OFF'}</span></div><div class='seg'><button class='btn ${v?'on':''}' data-set='${path}' data-val='1'>إظهار</button><button class='btn ${!v?'on':''}' data-set='${path}' data-val='0'>إخفاء</button></div>`}function field(label,path){return`<label><div class='lab'><span>${label}</span></div><input value='${esc(get(path))}' data-input='${path}'></label>`}function range(label,path,min,max,step=1){return`<label><div class='lab'><span>${label}</span><span>${get(path)}</span></div><input type='range' min='${min}' max='${max}' step='${step}' value='${get(path)}' data-input='${path}'></label>`}function left(){let html=`<div class='tabs'><button class='btn ${tab==='header'?'on':''}' data-tab='header'>الهيدر</button><button class='btn ${tab==='footer'?'on':''}' data-tab='footer'>الفوتر</button><button class='btn ${tab==='page'?'on':''}' data-tab='page'>الصفحة</button><button class='btn ${tab==='blocks'?'on':''}' data-tab='blocks'>العناصر</button></div>`;if(tab==='header')html+=`<div class='box'><h3>Header Controls — خصائص الهيدر</h3><div class='body'><div class='hint'>الهيدر هو الشريط العلوي داخل صفحة PDF. هنا تتحكم بالنصوص، الشعار، الارتفاع، والخط.</div>${bool('إظهار الهيدر','doc.header.on')}${bool('خط أسفل الهيدر','doc.header.line')}${range('ارتفاع الهيدر mm','doc.header.h',0,32)}${bool('منطقة الشعار','doc.header.logo')}${range('حجم الشعار mm','doc.header.logoSize',6,26)}${bool('نص بجانب الشعار','doc.header.logoText')}${field('نص الشعار','doc.header.logoLabel')}${bool('الخانة اليمنى','doc.header.leftOn')}${field('نص الخانة اليمنى','doc.header.left')}${bool('الخانة الوسطى','doc.header.midOn')}${field('نص الوسط','doc.header.mid')}${bool('الخانة اليسرى','doc.header.rightOn')}${field('نص الخانة اليسرى','doc.header.right')}</div></div>`;if(tab==='footer')html+=`<div class='box'><h3>Footer Controls — خصائص الفوتر</h3><div class='body'><div class='hint'>الفوتر هو الشريط السفلي. هنا تتحكم بترقيم الصفحة، النص الأوسط، وبيانات التواصل.</div>${bool('إظهار الفوتر','doc.footer.on')}${bool('خط أعلى الفوتر','doc.footer.line')}${range('ارتفاع الفوتر mm','doc.footer.h',0,24)}${bool('ترقيم الصفحات','doc.footer.page')}${field('نص ترقيم الصفحة','doc.footer.left')}${bool('النص الأوسط','doc.footer.midOn')}${field('النص الأوسط','doc.footer.mid')}${bool('بيانات التواصل','doc.footer.contact')}${field('بيانات التواصل','doc.footer.right')}</div></div>`;if(tab==='page')html+=`<div class='box'><h3>Page Settings</h3><div class='body'>${field('Accent color','doc.accent')}${range('Margin X mm','doc.mx',6,30)}${range('Margin Y mm','doc.my',6,30)}${bool('Grid','doc.grid')}</div></div>`;if(tab==='blocks')html+=`<div class='box'><h3>Block Library</h3><div class='body'><div class='grid2'><button class='btn' data-add='h1'>عنوان</button><button class='btn' data-add='p'>فقرة</button><button class='btn' data-add='note'>ملاحظة</button><button class='btn' data-add='table'>جدول</button></div></div></div>`;$('#left').innerHTML=html}function right(){let b=st.blocks.find(x=>x.id===sel);if(!b){$('#right').innerHTML=`<div class='box'><h3>Element Inspector</h3><div class='body'><div class='hint'>حدد عنواناً أو فقرة أو جدولاً من الصفحة لتظهر خصائصه هنا.</div></div></div>`;return}let html=`<div class='box'><h3>Element Inspector — ${b.type}</h3><div class='body'><div class='grid2'><button class='btn' data-move='-1'>↑</button><button class='btn' data-move='1'>↓</button><button class='btn' data-act='dup'>نسخ</button><button class='btn' data-act='del'>حذف</button></div></div></div>`;if(b.type!=='table')html+=`<div class='box'><h3>Text Properties</h3><div class='body'><label><div class='lab'>النص</div><textarea data-binput='text'>${esc(b.text)}</textarea></label>${brange('Font size','fs',7,42,.5)}${brange('Line height','lh',1,2.6,.05)}${brange('Spacing after','after',0,24)}${brange('Padding','pad',0,12)}<div class='seg'><button class='btn ${b.align==='right'?'on':''}' data-bset='align' data-bval='right'>يمين</button><button class='btn ${b.align==='center'?'on':''}' data-bset='align' data-bval='center'>وسط</button><button class='btn ${b.align==='left'?'on':''}' data-bset='align' data-bval='left'>يسار</button></div></div></div>`;if(b.type==='table')html+=`<div class='box'><h3>Table Controls</h3><div class='body'><div class='grid2'><button class='btn' data-row='1'>+ صف</button><button class='btn' data-row='-1'>− صف</button><button class='btn' data-col='1'>+ عمود</button><button class='btn' data-col='-1'>− عمود</button></div><div class='hint' style='margin-top:8px'>الخلايا تعدل مباشرة داخل الصفحة.</div></div></div>`;$('#right').innerHTML=html}function brange(label,key,min,max,step=1){let b=st.blocks.find(x=>x.id===sel);return`<label><div class='lab'><span>${label}</span><span>${b[key]}</span></div><input type='range' min='${min}' max='${max}' step='${step}' value='${b[key]}' data-binput='${key}'></label>`}function preview(){let d=st.doc;$('#canvas').innerHTML=`<section class='page ${d.grid?'grid':''}' style='--accent:${d.accent};--mx:${d.mx}mm;--my:${d.my}mm;--hh:${d.header.h}mm;--fh:${d.footer.h}mm;--logoSize:${d.header.logoSize||12}mm;--hl:${d.header.line?'1px solid var(--accent)':'0'};--fl:${d.footer.line?'1px solid #dbe4ea':'0'}'><div class='head ${d.header.on?'':'hide'}'><div style='${d.header.leftOn?'':'visibility:hidden'}'>${esc(d.header.left)}</div><div class='hc' style='${d.header.midOn?'':'visibility:hidden'}'>${esc(d.header.mid)}</div><div class='hr' style='${d.header.rightOn?'':'visibility:hidden'}'>${esc(d.header.right)} ${d.header.logo?`<img class='logoImg' src='${LOGO}' alt='NASCW'>${d.header.logoText?`<span class='logoText'>${esc(d.header.logoLabel)}</span>`:''}`:''}</div></div><div class='content'>${st.blocks.map(blockHTML).join('')}</div><div class='foot ${d.footer.on?'':'hide'}'><span>${d.footer.page?esc(d.footer.left.replace('{page}',1).replace('{total}',1)):''}</span><span>${d.footer.midOn?esc(d.footer.mid):''}</span><span>${d.footer.contact?esc(d.footer.right):''}</span></div></section>`}function blockHTML(b){let common=`class='blk ${sel===b.id?'sel':''} ${b.type==='note'?'note':''}' data-id='${b.id}' style='--fs:${b.fs||11}pt;--lh:${b.lh||1.7};--w:${b.w||400};--align:${b.align||'right'};--after:${b.after||6}mm;--pad:${b.pad||1}mm;--bbg:${b.bg?'rgba(0,212,255,.07)':'transparent'}'`;let tools=`<span class='tools'><button data-move='-1'>↑</button><button data-move='1'>↓</button><button data-act='del'>×</button></span>`;if(b.type==='h1')return`<div ${common}>${tools}<h1 class='txt' contenteditable data-edit='text'>${esc(b.text)}</h1></div>`;if(b.type==='p'||b.type==='note')return`<div ${common}>${tools}<p class='txt' contenteditable data-edit='text'>${esc(b.text)}</p></div>`;if(b.type==='table')return`<div ${common}>${tools}<table>${b.rows.map((r,i)=>`<tr>${r.map((c,j)=>i===0?`<th>${esc(c)}</th>`:`<td contenteditable data-cell='${j}'>${esc(c)}</td>`).join('')}</tr>`).join('')}</table></div>`;return''}function render(){left();right();preview();save()}function get(path){return path.split('.').reduce((o,k)=>o[k],st)}function setv(path,v){let a=path.split('.'),o=st;for(let i=0;i<a.length-1;i++)o=o[a[i]];o[a.at(-1)]=v;render()}function bset(k,v){let b=st.blocks.find(x=>x.id===sel);b[k]=v;render()}function add(t){let b={id:Math.random().toString(36).slice(2),type:t,text:t==='h1'?'عنوان جديد':t==='note'?'ملاحظة مهمة':'فقرة جديدة',fs:t==='h1'?24:11,lh:1.7,w:t==='h1'?800:400,align:'right',after:6,pad:t==='note'?5:1,bg:t==='note'};if(t==='table')b={id:Math.random().toString(36).slice(2),type:'table',rows:[['الخدمة','الوصف','السعر'],['','','']],after:8,pad:1,align:'right'};st.blocks.push(b);sel=b.id;tab='blocks';render()}function del(){st.blocks=st.blocks.filter(x=>x.id!==sel);sel=null;render()}function dup(){let b=st.blocks.find(x=>x.id===sel),n=JSON.parse(JSON.stringify(b));n.id=Math.random().toString(36).slice(2);st.blocks.splice(st.blocks.indexOf(b)+1,0,n);sel=n.id;render()}function move(d){let i=st.blocks.findIndex(x=>x.id===sel),j=i+d;if(j<0||j>=st.blocks.length)return;[st.blocks[i],st.blocks[j]]=[st.blocks[j],st.blocks[i]];render()}function row(d){let b=st.blocks.find(x=>x.id===sel);if(d>0)b.rows.push(Array(b.rows[0].length).fill(''));else if(b.rows.length>1)b.rows.pop();render()}function col(d){let b=st.blocks.find(x=>x.id===sel);if(d>0)b.rows.forEach(r=>r.push(''));else if(b.rows[0].length>1)b.rows.forEach(r=>r.pop());render()}function esc(s){return String(s??'').replace(/[&<>']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;'}[m]))}app();document.addEventListener('click',e=>{let t=e.target;if(t.dataset.tab){tab=t.dataset.tab;render()}if(t.dataset.add)add(t.dataset.add);if(t.dataset.set)setv(t.dataset.set,t.dataset.val==='1');if(t.dataset.id){sel=t.dataset.id;render()}if(t.dataset.act==='print')print();if(t.dataset.act==='del')del();if(t.dataset.act==='dup')dup();if(t.dataset.move)move(+t.dataset.move);if(t.dataset.row)row(+t.dataset.row);if(t.dataset.col)col(+t.dataset.col)});document.addEventListener('input',e=>{let t=e.target;if(t.dataset.input)setv(t.dataset.input,t.type==='range'?+t.value:t.value);if(t.dataset.binput)bset(t.dataset.binput,t.type==='range'?+t.value:t.value);if(t.dataset.edit){let b=st.blocks.find(x=>x.id===sel);if(b){b.text=t.innerText;save()}}});</script></body></html>
