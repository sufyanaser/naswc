<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NAS Document Studio — docpdf</title>
  <meta name="robots" content="noindex" />
  <style>
    *{box-sizing:border-box}
    html,body{width:100%;height:100%;margin:0;background:#060a12;color:#e8f3fb;font-family:"IBM Plex Sans Arabic","Segoe UI",Tahoma,Arial,sans-serif;overflow:hidden}
    .boot{position:fixed;inset:0;display:grid;place-items:center;background:#060a12}
    .box{width:min(520px,calc(100vw - 32px));border:1px solid rgba(0,212,255,.18);border-radius:18px;background:#0b1320;padding:22px;line-height:1.8;box-shadow:0 18px 60px rgba(0,0,0,.42)}
    .title{font-weight:900;color:#e8f3fb;margin-bottom:8px}.muted{color:#8094aa;font-size:13px}.err{color:#ff7088;white-space:pre-wrap;direction:ltr;text-align:left;margin-top:12px;font-family:Consolas,monospace;font-size:12px}
  </style>
</head>
<body>
  <div class="boot"><div class="box"><div class="title">NAS Document Studio</div><div class="muted">Loading local document editor…</div><div id="err" class="err"></div></div></div>
  <script>
    (async function(){
      const err = document.getElementById('err');
      const source = 'https://raw.githubusercontent.com/sufyanaser/NAS_docstudio/main/index.html?ts=' + Date.now();
      try {
        const res = await fetch(source, { cache: 'no-store' });
        if (!res.ok) throw new Error('Source HTTP ' + res.status);
        const html = await res.text();
        const doc = new DOMParser().parseFromString(html, 'text/html');
        const title = doc.querySelector('title');
        if (title) document.title = title.textContent;
        document.head.querySelectorAll('style[data-docstudio],link[data-docstudio]').forEach(x => x.remove());
        doc.querySelectorAll('style').forEach(style => {
          const s = document.createElement('style');
          s.dataset.docstudio = 'true';
          s.textContent = style.textContent;
          document.head.appendChild(s);
        });
        document.body.innerHTML = doc.body.innerHTML || '<div id="app-root"></div>';
        const scripts = Array.from(doc.querySelectorAll('script'));
        for (const old of scripts) {
          const s = document.createElement('script');
          if (old.src) s.src = old.src;
          else s.textContent = old.textContent;
          document.body.appendChild(s);
        }
      } catch (e) {
        document.body.innerHTML = '<div class="boot"><div class="box"><div class="title">NAS Document Studio load failed</div><div class="muted">تعذر تحميل المحرر من GitHub.</div><div class="err">' + String(e && e.stack || e).replace(/[&<>]/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[m])) + '</div></div></div>';
      }
    })();
  </script>
</body>
</html>
