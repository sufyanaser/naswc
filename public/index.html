<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>NAS CodeWorks — برامج تشتغل بمحلك، مو على السحابة</title>
<meta name="description" content="نبني لشركتك برنامج Desktop خاص يدير المخزن والفواتير والأرشيف — يشتغل بدون إنترنت، بياناتك بجهازك.">
<link id="favicon" rel="icon" type="image/svg+xml" href="nas-codeworks-favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/intro-logo.css" data-nas-intro="direct-style">
<script src="/intro-logo.js" defer data-nas-intro="direct-script"></script>
<style>
:root{--bg:#080C14;--bg-2:#0B1220;--panel:#0F1A2E;--panel-2:#13233E;--line:#1E3354;--line-soft:#16263F;--fg:#EAF1FB;--fg-2:#94A7C2;--fg-3:#5E7290;--cyan:#00D4FF;--violet:#7C3AED;--violet-soft:#9F67F0;--green:#22C98A;--amber:#F5A524;--red:#EF4D4D;--r:16px;--r-lg:22px;--shadow:0 18px 50px -20px rgba(0,0,0,.7);--maxw:1140px;font-synthesis-weight:none}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{font-family:'IBM Plex Sans Arabic',system-ui,sans-serif;background:var(--bg);color:var(--fg);line-height:1.75;font-weight:400;overflow-x:hidden;font-variant-numeric:tabular-nums}
body::before{content:"";position:fixed;inset:0;z-index:-2;pointer-events:none;background:radial-gradient(900px 600px at 90% -10%,rgba(0,212,255,.08),transparent 60%),radial-gradient(800px 600px at -5% 108%,rgba(124,58,237,.12),transparent 62%),linear-gradient(160deg,#0A1322 0%,var(--bg) 50%,#060A11 100%)}
body::after{content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;opacity:.4;background-image:linear-gradient(var(--line-soft) 1px,transparent 1px),linear-gradient(90deg,var(--line-soft) 1px,transparent 1px);background-size:54px 54px;-webkit-mask-image:radial-gradient(circle at 50% 30%,#000 0%,transparent 75%);mask-image:radial-gradient(circle at 50% 30%,#000 0%,transparent 75%)}
a{color:inherit;text-decoration:none}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 20px}
.nav{position:sticky;top:0;z-index:100;background:rgba(8,12,20,.82);backdrop-filter:blur(14px);border-bottom:1px solid var(--line-soft)}
.nav-in{display:flex;align-items:center;justify-content:space-between;height:64px}
.brand{display:flex;align-items:center;gap:11px;font-weight:700;font-size:17px}
.brand .mk{width:34px;height:34px;border-radius:9px;flex:none;background:linear-gradient(135deg,var(--cyan),var(--violet));display:grid;place-items:center;position:relative;box-shadow:0 4px 16px -4px rgba(0,212,255,.5)}
.brand .mk::before{content:"";position:absolute;width:13px;height:13px;border:2.5px solid #081019;border-radius:3px;transform:rotate(45deg)}
.brand b{color:#fff}.brand span{color:var(--cyan)}
.nav-cta{display:inline-flex;align-items:center;gap:8px;background:var(--green);color:#04130C;font-weight:600;font-size:14px;padding:9px 16px;border-radius:11px;transition:.2s}
.nav-cta:hover{transform:translateY(-1px);box-shadow:0 8px 20px -8px rgba(34,201,138,.6)}
.nav-cta svg{width:17px;height:17px}
.hero{padding:64px 0 40px;text-align:center;position:relative}
.pill{display:inline-flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--line);padding:7px 15px;border-radius:100px;font-size:13px;color:var(--fg-2);margin-bottom:26px}
.pill .dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 10px var(--green)}
.hero h1{font-size:clamp(28px,6.5vw,52px);font-weight:700;line-height:1.3;letter-spacing:-.5px;margin-bottom:20px}
.hero h1 .hl{background:linear-gradient(120deg,var(--cyan),var(--violet-soft));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.hero .sub{font-size:clamp(16px,2.4vw,20px);color:var(--fg-2);max-width:620px;margin:0 auto 18px;line-height:1.8}
.hero .micro{font-size:14px;color:var(--fg-3);max-width:560px;margin:0 auto 34px}
.hero-cta{display:flex;flex-wrap:wrap;gap:13px;justify-content:center;align-items:center}
.btn{display:inline-flex;align-items:center;gap:9px;font-weight:600;font-size:15.5px;padding:15px 26px;border-radius:13px;transition:.2s;cursor:pointer;border:none;font-family:inherit}
.btn svg{width:19px;height:19px;flex:none}
.btn-wa{background:var(--green);color:#04130C}
.btn-wa:hover{transform:translateY(-2px);box-shadow:0 14px 30px -14px rgba(34,201,138,.7)}
.btn-ghost{background:rgba(15,26,46,.72);border:1px solid var(--line);color:var(--fg)}
.btn-ghost:hover{border-color:var(--cyan);transform:translateY(-2px)}
.trust{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-top:24px;color:var(--fg-3);font-size:13px}.trust span{display:flex;align-items:center;gap:6px}.trust svg{width:15px;height:15px;color:var(--green)}
section{padding:70px 0;position:relative}.kicker{color:var(--cyan);font-weight:600;font-size:13px;margin-bottom:10px;display:flex;align-items:center;gap:10px}.kicker::before{content:"";width:28px;height:2px;background:var(--cyan);border-radius:9px}
.sec{font-size:clamp(25px,4vw,38px);line-height:1.35;margin-bottom:12px;font-weight:700}.sec-sub{color:var(--fg-2);font-size:16px;max-width:680px;margin-bottom:36px}
.pain-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.pain-card{background:linear-gradient(180deg,var(--panel),#0C1628);border:1px solid var(--line-soft);border-radius:var(--r);padding:22px;min-height:180px;transition:.25s}.pain-card:hover{border-color:var(--line);transform:translateY(-3px)}.pain-card .ic{width:38px;height:38px;border-radius:12px;background:rgba(239,77,77,.1);display:grid;place-items:center;color:var(--red);margin-bottom:16px}.pain-card h3{font-size:16px;margin-bottom:8px}.pain-card p{color:var(--fg-2);font-size:14px;line-height:1.8}
.ba{display:grid;grid-template-columns:1fr 1fr;gap:18px}.ba-col{background:var(--panel);border:1px solid var(--line-soft);border-radius:var(--r-lg);padding:26px}.ba-col.after{background:linear-gradient(145deg,rgba(0,212,255,.08),var(--panel));border-color:rgba(0,212,255,.22)}.ba-col h3{font-size:18px;margin-bottom:15px}.ba-col.before h3{color:var(--red)}.ba-col.after h3{color:var(--green)}.ba-col ul{list-style:none;display:grid;gap:10px}.ba-col li{display:flex;gap:9px;color:var(--fg-2);font-size:14px}.ba-col li svg{width:17px;height:17px;flex:none;margin-top:3px}.before svg{color:var(--red)}.after svg{color:var(--green)}
.svc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.svc{background:linear-gradient(180deg,var(--panel),#0C1628);border:1px solid var(--line);border-radius:var(--r-lg);padding:28px;position:relative;overflow:hidden}.svc.featured{border-color:var(--violet);box-shadow:0 0 0 1px rgba(124,58,237,.45),0 18px 55px -28px rgba(124,58,237,.7)}.svc-badge{position:absolute;top:16px;inset-inline-start:16px;background:var(--violet-soft);color:#fff;font-size:12px;font-weight:700;padding:4px 10px;border-radius:100px}.svc .ic{width:52px;height:52px;border-radius:16px;background:rgba(0,212,255,.09);display:grid;place-items:center;color:var(--cyan);margin-bottom:20px}.svc h3{font-size:20px;margin-bottom:10px}.svc p{color:var(--fg-2);font-size:14px;min-height:70px}.svc ul{list-style:none;display:grid;gap:10px;margin:18px 0 22px}.svc li{display:flex;gap:8px;font-size:14px}.svc li svg{width:16px;height:16px;color:var(--green);margin-top:4px;flex:none}.price{border-top:1px solid var(--line-soft);padding-top:20px;margin-top:auto}.price small{color:var(--fg-3);display:block}.price strong{font-size:30px;line-height:1}.price span{color:var(--fg-2);font-size:13px}.svc-go{width:100%;justify-content:center;margin-top:20px;background:var(--panel-2);border:1px solid var(--line);color:var(--fg);padding:13px 16px}.featured .svc-go{background:var(--green);color:#04130C;border-color:var(--green)}
.pricing-note{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:20px;color:var(--fg-2);font-size:13px}.pricing-note span{display:flex;align-items:center;gap:7px;background:rgba(15,26,46,.5);border:1px solid var(--line-soft);padding:7px 12px;border-radius:100px}.pricing-note svg{color:var(--cyan);width:15px}
.proof-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.proof-card{background:var(--panel);border:1px solid var(--line-soft);border-radius:var(--r);overflow:hidden}.proof-shot{aspect-ratio:16/9;background:linear-gradient(135deg,#101C33,#11284A);display:grid;place-items:center;color:var(--cyan);font-weight:700;position:relative}.proof-shot img{width:100%;height:100%;object-fit:cover;display:block}.proof-body{padding:18px}.proof-body h3{font-size:16px;margin-bottom:6px}.proof-body p{color:var(--fg-2);font-size:13.5px;line-height:1.7}.founder{display:flex;gap:18px;align-items:center;background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:22px;margin-top:18px}.founder-av{width:70px;height:70px;border-radius:16px;background:linear-gradient(135deg,var(--cyan),var(--violet));display:grid;place-items:center;font-weight:800;flex:none;overflow:hidden}.founder-av img{width:100%;height:100%;object-fit:cover;display:block}.founder p{color:var(--fg-2);font-size:14px}.founder strong{color:#fff}.metric{display:flex;gap:18px;margin-top:10px}.metric b{font-size:22px;color:#fff}.metric span{font-size:12px;color:var(--fg-3)}
.team-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}.tm{background:var(--panel);border:1px solid var(--line);border-radius:var(--r-lg);overflow:hidden}.tm-photo{aspect-ratio:1.25/1;background:linear-gradient(135deg,rgba(0,212,255,.08),rgba(124,58,237,.08));display:grid;place-items:center;position:relative;overflow:hidden}.tm-photo img{width:100%;height:100%;object-fit:cover;display:block}.tm-ph{font-size:44px;color:rgba(0,212,255,.25);font-weight:800}.tm-body{padding:20px}.tm-body .nm{font-weight:700;font-size:18px}.tm-body .rl{color:var(--cyan);font-weight:600;font-size:14px}.tm-body .bio{color:var(--fg-2);font-size:13.5px;margin-top:12px}
.proc{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.proc-step{background:var(--panel);border:1px solid var(--line-soft);border-radius:var(--r);padding:22px}.proc-step .num{color:var(--cyan);font-weight:800;font-size:13px}.proc-step h3{font-size:16px;margin:8px 0}.proc-step p{color:var(--fg-2);font-size:13.5px;line-height:1.7}
.vs-wrap{overflow:auto;border:1px solid var(--line);border-radius:var(--r);background:rgba(15,26,46,.45)}table.vs{width:100%;border-collapse:collapse;min-width:720px}table.vs th,table.vs td{border-bottom:1px solid var(--line-soft);padding:17px 18px;text-align:right;font-size:14px}table.vs th{background:var(--panel);font-weight:700}table.vs tr:last-child td{border-bottom:0}.us{background:rgba(0,212,255,.07);color:var(--cyan);font-weight:700}.vs-yes{color:var(--green)}.vs-no{color:var(--fg-3)}
.start{display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:center;background:linear-gradient(135deg,rgba(0,212,255,.09),rgba(124,58,237,.08));border:1px solid var(--line);border-radius:var(--r-lg);padding:36px}.start h2{font-size:clamp(25px,4vw,38px);line-height:1.35}.start p{color:var(--fg-2);margin:14px 0}.start ul{list-style:none;display:grid;gap:10px;margin-top:20px}.start li{display:flex;gap:8px;color:var(--fg-2)}.start li svg{color:var(--green);width:17px;margin-top:4px}.form-card{background:rgba(8,12,20,.55);border:1px solid var(--line);border-radius:var(--r);padding:22px}.form-card label{display:block;font-size:13px;color:var(--fg-2);margin:10px 0 6px}.form-card input,.form-card select,.form-card textarea{width:100%;background:#091323;border:1px solid var(--line);border-radius:10px;color:var(--fg);font-family:inherit;padding:12px}.form-card textarea{min-height:100px;resize:vertical}.form-card .btn{width:100%;justify-content:center;margin-top:14px;padding:13px}
.faq-list{display:grid;gap:10px;max-width:820px}.faq{background:var(--panel);border:1px solid var(--line-soft);border-radius:13px;overflow:hidden}.faq summary{cursor:pointer;padding:15px 18px;font-weight:600;list-style:none;display:flex;justify-content:space-between;gap:16px}.faq summary::-webkit-details-marker{display:none}.faq summary::after{content:"+";color:var(--cyan);font-size:18px}.faq[open] summary::after{content:"−"}.faq p{color:var(--fg-2);padding:0 18px 16px;font-size:14px;line-height:1.8}
footer{border-top:1px solid var(--line-soft);padding:34px 0;color:var(--fg-3);font-size:13px}.foot{display:flex;justify-content:space-between;gap:20px;flex-wrap:wrap}.foot .brand{font-size:15px}.contact-lines{display:grid;gap:6px}.contact-lines a{color:var(--fg-2)}
.rv{opacity:0;transform:translateY(18px);transition:opacity .55s ease,transform .55s ease}.rv.on{opacity:1;transform:none}
@media(max-width:900px){.pain-grid,.svc-grid,.proof-grid,.team-grid,.proc,.ba,.start{grid-template-columns:1fr}.nav-in{height:58px}.brand b{display:none}.hero{padding-top:48px}.founder{align-items:flex-start}.foot{display:grid}.metric{flex-wrap:wrap}.sec-sub{margin-bottom:24px}}
@media(max-width:520px){.wrap{padding:0 15px}.btn{width:100%;justify-content:center}.hero-cta{width:100%}.trust{font-size:12px}.svc,.pain-card,.ba-col,.start{padding:20px}.hero h1{font-size:34px}.founder{display:grid}.founder-av{width:60px;height:60px}.nav-cta{padding:8px 12px;font-size:13px}}
</style>
</head>
<body>
<nav class="nav"><div class="wrap nav-in"><a href="#top" class="brand"><span class="mk"></span><span>NAS</span> <b>CodeWorks</b></a><a class="nav-cta" data-wa="consult" href="#start"><span data-t="navCta">متابعة</span><i data-ico="message-circle"></i></a></div></nav>
<main id="top">
<section class="hero"><div class="wrap rv"><div class="pill"><span class="dot"></span><span data-t="heroPill"></span></div><h1><span data-t="heroTitleLine1"></span><br><span class="hl" data-t="heroTitleHl"></span><br><span data-t="heroTitleLine3"></span></h1><p class="sub" data-t="heroSub"></p><p class="micro" data-t="heroMicro"></p><div class="hero-cta"><a class="btn btn-wa" data-wa="hero" href="#start"><i data-ico="message-circle"></i><span data-t="heroPrimaryCta"></span></a><a class="btn btn-ghost" href="#services"><span data-t="heroSecondaryCta"></span></a></div><div class="trust" id="trust"></div></div></section>
<section id="pain"><div class="wrap"><div class="kicker rv" data-t="painKicker"></div><h2 class="sec rv" data-t="painTitle"></h2><p class="sec-sub rv" data-t="painSub"></p><div class="pain-grid" id="painGrid"></div></div></section>
<section id="ba"><div class="wrap"><div class="kicker rv" data-t="baKicker"></div><h2 class="sec rv" data-t="baTitle"></h2><p class="sec-sub rv" data-t="baSub"></p><div class="ba"><div class="ba-col before rv"><h3>قبل</h3><ul id="beforeList"></ul></div><div class="ba-col after rv"><h3>بعد</h3><ul id="afterList"></ul></div></div></div></section>
<section id="services"><div class="wrap"><div class="kicker rv" data-t="servicesKicker"></div><h2 class="sec rv" data-t="servicesTitle"></h2><p class="sec-sub rv" data-t="servicesSub"></p><div class="svc-grid" id="servicesGrid"></div><div class="pricing-note" id="pricingNotes"></div></div></section>
<section id="proof"><div class="wrap"><div class="kicker rv" data-t="proofKicker"></div><h2 class="sec rv" data-t="proofTitle"></h2><p class="sec-sub rv" data-t="proofSub"></p><div class="proof-grid" id="proofGrid"></div><div class="founder rv" id="founderBox"></div></div></section>
<section id="team"><div class="wrap"><div class="kicker rv" data-t="teamKicker"></div><h2 class="sec rv" data-t="teamTitle"></h2><p class="sec-sub rv" data-t="teamSub"></p><div class="team-grid" id="teamGrid"></div></div></section>
<section id="process"><div class="wrap"><div class="kicker rv" data-t="processKicker"></div><h2 class="sec rv" data-t="processTitle"></h2><p class="sec-sub rv" data-t="processSub"></p><div class="proc" id="processGrid"></div></div></section>
<section id="why"><div class="wrap"><div class="kicker rv" data-t="whyKicker"></div><h2 class="sec rv" data-t="whyTitle"></h2><p class="sec-sub rv" data-t="whySub"></p><div class="vs-wrap rv"><table class="vs" id="whyTable"></table></div></div></section>
<section id="start"><div class="wrap"><div class="start rv"><div><h2 data-t="startTitle"></h2><p data-t="startSub"></p><ul id="startBullets"></ul><a class="btn btn-wa" data-wa="start" href="#"><i data-ico="message-circle"></i><span data-t="startButton"></span></a></div><form class="form-card" id="leadForm"><h3 data-t="formTitle"></h3><p style="color:var(--fg-2);font-size:13px" data-t="formSub"></p><label>اسمك</label><input name="name" required placeholder="مثلاً: أحمد"><label>رقم الواتساب</label><input name="phone" required placeholder="07xxxxxxxxx"><label>نوع المشروع</label><select name="type"><option>برنامج Desktop خاص</option><option>أرشفة وإدارة وثائق</option><option>أتمتة وتقارير وربط بيانات</option><option>غير متأكد</option></select><label>اشرح المشكلة باختصار</label><textarea name="msg" placeholder="مثلاً: عندي مخزن وفواتير وديون وأريد كل شيء بمكان واحد..."></textarea><button class="btn btn-wa" type="submit"><i data-ico="send"></i><span data-t="formButton"></span></button><p style="color:var(--fg-3);font-size:12px;margin-top:10px" data-t="formNote"></p></form></div></div></section>
<section id="faq"><div class="wrap"><div class="kicker rv" data-t="faqKicker"></div><h2 class="sec rv" data-t="faqTitle"></h2><div class="faq-list" id="faqList"></div></div></section>
</main>
<footer><div class="wrap foot"><div><div class="brand"><span>NAS</span> <b>CodeWorks</b></div><p data-t="footerText"></p><p>© <span id="year"></span> NAS CodeWorks</p></div><div class="contact-lines" id="contactLines"></div></div></footer>
<script src="content-default.js"></script>
<script src="render.js"></script>
</body>
</html>
